<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK 접속 현황 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        #mainDashboard { display: none; }
        .glass-card { background: white; border: 1px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-100 z-[9999] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="mb-6 inline-block p-5 rounded-full bg-white shadow-sm border border-slate-200">
                <i class="fa-solid fa-lock text-slate-400 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 mb-8">ADMIN ACCESS</h1>
            <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-xl">
                <input type="password" id="pwInput" placeholder="비밀번호 입력" maxlength="4"
                       class="w-full bg-slate-50 border-none rounded-xl text-slate-800 text-3xl text-center mb-6 py-4 focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="checkPassword()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-700 transition-all shadow-md">
                    로그인
                </button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="p-4 lg:p-10 max-w-[1400px] mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-6">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <span class="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase">Manager</span>
                    <span class="flex items-center gap-1.5 text-blue-600 text-[10px] font-bold">
                        <span class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></span> 실시간 모니터링 중
                    </span>
                </div>
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">BSTK <span class="text-blue-600 font-black">접속 현황 확인</span></h2>
            </div>
            <div class="flex flex-col items-end">
                <p id="updateTime" class="text-[10px] font-bold text-slate-400 mb-2 uppercase">데이터 동기화 중...</p>
                <div class="w-64 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress" class="h-full bg-blue-600 w-0 transition-all duration-[30000ms] ease-linear"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-7 rounded-[1.5rem] shadow-sm">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3">현재 접속자</p>
                <div class="flex items-baseline gap-1">
                    <span id="activeCount" class="text-5xl font-black text-slate-900">0</span>
                    <span class="text-slate-400 font-bold">/ <span id="totalRegistered">0</span>명</span>
                </div>
            </div>
            <div class="glass-card p-7 rounded-[1.5rem] shadow-sm">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3">오늘 접속 합계</p>
                <div class="flex items-baseline gap-1">
                    <span id="todayCount" class="text-5xl font-black text-slate-900">0</span>
                    <span class="text-slate-400 font-bold text-sm">회</span>
                </div>
                <div class="mt-4 flex gap-3">
                    <div class="text-[10px] font-bold px-2 py-0.5 bg-blue-50 text-blue-600 rounded">PC <span id="todayPc">0</span></div>
                    <div class="text-[10px] font-bold px-2 py-0.5 bg-purple-50 text-purple-600 rounded">MOB <span id="todayMobile">0</span></div>
                </div>
            </div>
            <div class="glass-card p-7 rounded-[1.5rem] shadow-sm">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3">이번 주 누적</p>
                <div class="flex items-baseline gap-1">
                    <span id="weekCount" class="text-5xl font-black text-slate-900">0</span>
                </div>
            </div>
            <div class="bg-slate-800 p-7 rounded-[1.5rem] shadow-lg text-white">
                <p class="text-slate-400 text-[11px] font-bold uppercase tracking-wider mb-3">연간 전체 누적 (Total)</p>
                <span id="monthCount" class="text-5xl font-black">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass-card p-8 rounded-[2rem] shadow-sm h-[600px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-sm text-slate-800">실시간 접속 명단</h3>
                    <span id="activeCountBadge" class="bg-blue-100 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full">0명</span>
                </div>
                <div id="userList" class="space-y-3 overflow-y-auto pr-2 custom-scrollbar flex-grow text-sm">
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="glass-card p-8 rounded-[2rem] shadow-sm">
                    <h3 class="font-bold text-xs text-slate-400 mb-6 uppercase tracking-widest">24시간 접속 트렌드</h3>
                    <div class="h-48 w-full"><canvas id="trafficChart"></canvas></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="glass-card p-8 rounded-[2rem] shadow-sm">
                        <h3 class="font-bold text-xs text-blue-600 mb-6 uppercase tracking-widest">누적 접속 랭킹 (Top 10)</h3>
                        <div id="rankingList" class="space-y-3 text-sm"></div>
                    </div>
                    <div class="glass-card p-8 rounded-[2rem] shadow-sm flex flex-col items-center">
                        <h3 class="font-bold text-xs text-slate-400 mb-6 uppercase tracking-widest text-center w-full">기기별 사용 비중</h3>
                        <div class="w-40 h-40 relative"><canvas id="deviceChart"></canvas></div>
                        <div class="mt-6 flex gap-10 text-center">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 mb-1">PC</p>
                                <p id="pcRatio" class="text-xl font-black text-blue-600">0%</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 mb-1">MOBILE</p>
                                <p id="mobRatio" class="text-xl font-black text-purple-600">0%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 💡 [수정완료] 기현님이 새로 발급받은 API URL로 교체되었습니다.
        const API_URL = "https://script.google.com/macros/s/AKfycbxk2zwCJgOPjjzjgNw7niq5hmMJjqJ0iTwSSaxZZnyZeuuy1CrigPLtWoP2P5TzRUD4/exec";
        const ADMIN_PW = "1541";
        
        function checkPassword() {
            if(document.getElementById('pwInput').value === ADMIN_PW) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                initCharts(); updateDashboard();
                setInterval(updateDashboard, 30000);
            } else {
                alert("비밀번호가 틀렸습니다.");
                document.getElementById('pwInput').value = '';
            }
        }

        document.getElementById('pwInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });

        let trafficChart, deviceChart;

        function initCharts() {
            const ctxT = document.getElementById('trafficChart').getContext('2d');
            trafficChart = new Chart(ctxT, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i + '시'),
                    datasets: [{
                        data: Array(24).fill(0),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                        y: { display: false }
                    }
                }
            });

            const ctxD = document.getElementById('deviceChart').getContext('2d');
            deviceChart = new Chart(ctxD, {
                type: 'doughnut',
                data: {
                    labels: ['PC', 'Mobile'],
                    datasets: [{ data: [1, 1], backgroundColor: ['#3b82f6', '#a855f7'], borderWidth: 0, cutout: '80%' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function updateDashboard() {
            const bar = document.getElementById("progress");
            bar.style.transition = 'none'; bar.style.width = "0%";
            setTimeout(() => { bar.style.transition = 'width 30000ms linear'; bar.style.width = "100%"; }, 100);

            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                document.getElementById("activeCount").innerText = data.activeCount;
                document.getElementById("activeCountBadge").innerText = data.activeCount + "명";
                document.getElementById("totalRegistered").innerText = data.totalRegistered;
                document.getElementById("todayCount").innerText = data.daily.count;
                document.getElementById("todayPc").innerText = data.daily.pc;
                document.getElementById("todayMobile").innerText = data.daily.mobile;
                document.getElementById("weekCount").innerText = data.weekly.count;
                
                // 💡 [수정완료] [object Object] 에러를 방지하고 정확한 숫자를 뽑아옵니다.
                let yearlyTotal = 0;
                if (data.yearly && data.yearly.count !== undefined) {
                    yearlyTotal = data.yearly.count;
                } else if (data.monthly && data.monthly.count !== undefined) {
                    yearlyTotal = data.monthly.count;
                } else {
                    yearlyTotal = data.yearly || 0;
                }
                document.getElementById("monthCount").innerText = yearlyTotal.toLocaleString();
                
                document.getElementById("updateTime").innerText = "최종 갱신: " + new Date().toLocaleTimeString();

                const listDiv = document.getElementById("userList");
                listDiv.innerHTML = data.activeList.length ? "" : '<div class="h-full flex items-center justify-center text-slate-300 py-20 font-bold italic">접속자 없음</div>';
                data.activeList.forEach(u => {
                    listDiv.innerHTML += `
                        <div class="bg-slate-50 p-4 rounded-xl flex justify-between items-center border border-slate-100">
                            <div class="flex items-center gap-2">
                                <span class="status-dot bg-blue-600 animate-pulse"></span>
                                <span class="font-bold text-slate-700">${u.name}님</span>
                            </div>
                            <span class="text-[10px] font-bold text-blue-600">접속 중</span>
                        </div>`;
                });

                const rankDiv = document.getElementById("rankingList");
                rankDiv.innerHTML = "";
                data.ranking.forEach((u, i) => {
                    rankDiv.innerHTML += `
                        <div class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-lg shadow-sm">
                            <span class="font-bold text-slate-400 text-xs w-6">#${i+1}</span>
                            <span class="font-bold text-slate-700 flex-grow">${u.name}</span>
                            <span class="font-bold text-blue-600">${u.count.toLocaleString()} <span class="text-[9px] text-slate-400">회</span></span>
                        </div>`;
                });

                trafficChart.data.datasets[0].data = data.hourlyTraffic; trafficChart.update();
                deviceChart.data.datasets[0].data = [data.total.pc, data.total.mobile]; deviceChart.update();
                const total = data.total.count || 1;
                const pcP = Math.round((data.total.pc / total) * 100);
                document.getElementById("pcRatio").innerText = pcP + "%";
                document.getElementById("mobRatio").innerText = (100 - pcP) + "%";

            } catch (e) { console.error("Sync Error:", e); }
        }
    </script>
</body>
</html>
