<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK INTELLIGENCE TOWER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0f1a] text-slate-300 min-h-screen font-sans selection:bg-blue-500/30">

    <div class="max-w-[1400px] mx-auto p-4 lg:p-10">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-12 gap-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded tracking-tighter">ADMIN ONLY</span>
                    <span id="liveStatus" class="flex items-center gap-1.5 text-green-500 text-[10px] font-bold tracking-widest">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></span> SYSTEM LIVE
                    </span>
                </div>
                <h1 class="text-5xl font-black text-white tracking-tighter italic">BSTK <span class="text-blue-500">INTELLIGENCE</span></h1>
            </div>
            <div class="flex flex-col items-end gap-1">
                <span id="updateTime" class="text-xs font-mono font-bold text-slate-500 tracking-tighter italic uppercase">Waiting for data...</span>
                <div class="h-1 w-48 bg-slate-800 rounded-full overflow-hidden">
                    <div id="progress" class="h-full bg-blue-500 w-0 transition-all duration-[15000ms] ease-linear"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute -right-4 -bottom-4 text-8xl text-blue-500/5 group-hover:scale-110 transition-transform"><i class="fa-solid fa-bolt"></i></div>
                <p class="text-slate-500 text-[11px] font-black uppercase tracking-widest mb-1">실시간 동시 접속</p>
                <div class="flex items-baseline gap-2">
                    <span id="activeCount" class="text-5xl font-black text-blue-500">0</span>
                    <span class="text-slate-600 font-bold">/ <span id="totalRegistered">0</span></span>
                </div>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl group">
                <p class="text-slate-500 text-[11px] font-black uppercase tracking-widest mb-1">오늘 총 사용량</p>
                <div class="flex items-baseline gap-2">
                    <span id="todayCount" class="text-5xl font-black text-white">0</span>
                    <span class="text-slate-600 font-bold text-xs">클릭/회</span>
                </div>
                <div class="mt-3 flex gap-3">
                    <span class="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-2 py-0.5 rounded italic">PC: <span id="todayPc">0</span></span>
                    <span class="text-[10px] font-bold text-purple-400 bg-purple-500/10 px-2 py-0.5 rounded italic">MOB: <span id="todayMobile">0</span></span>
                </div>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                <p class="text-slate-500 text-[11px] font-black uppercase tracking-widest mb-1">이번 달 누적</p>
                <div class="flex items-baseline gap-2">
                    <span id="monthCount" class="text-5xl font-black text-white font-mono tracking-tighter">0</span>
                </div>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl ring-2 ring-blue-500/20">
                <p class="text-blue-500/50 text-[11px] font-black uppercase tracking-widest mb-1">전체 서비스 이용</p>
                <div class="flex items-baseline gap-2">
                    <span id="totalCount" class="text-5xl font-black text-blue-400">0</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] lg:col-span-1">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-sm uppercase tracking-widest text-slate-400">Live Members</h3>
                    <span class="text-[10px] text-green-500 font-bold animate-pulse uppercase">Tracking Now</span>
                </div>
                <div id="userList" class="space-y-3 h-[420px] overflow-y-auto pr-2 custom-scrollbar">
                    </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem]">
                    <h3 class="font-black text-sm uppercase tracking-widest text-slate-400 mb-6 italic underline decoration-blue-500/50">24-Hour Traffic Trend (Hourly)</h3>
                    <div class="h-40 w-full">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem]">
                        <h3 class="font-black text-sm uppercase tracking-widest text-yellow-500 mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-medal"></i> Loyalty Ranking (TOP 5)
                        </h3>
                        <div id="rankingList" class="space-y-4">
                            </div>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] flex flex-col items-center">
                        <h3 class="font-black text-sm uppercase tracking-widest text-slate-400 mb-6 w-full italic">Device Distribution</h3>
                        <div class="w-48 h-48 relative">
                            <canvas id="deviceChart"></canvas>
                        </div>
                        <div class="mt-6 flex gap-10">
                            <div class="text-center">
                                <p class="text-[10px] font-bold text-slate-500">PC</p>
                                <p id="pcRatio" class="text-xl font-black text-blue-500">0%</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] font-bold text-slate-500">MOBILE</p>
                                <p id="mobRatio" class="text-xl font-black text-purple-500">0%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx5LVTNqTIQYTwdUozvJ3UcFOUYxUqW_kbok5W07dqMY8WSsGJHmsTilyJL1hUgvToJ/exec";
        
        let trafficChart, deviceChart;

        async function initCharts() {
            const ctxT = document.getElementById('trafficChart').getContext('2d');
            trafficChart = new Chart(ctxT, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i + 'h'),
                    datasets: [{
                        label: '접속량',
                        data: Array(24).fill(0),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 0
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } },
                        y: { display: false }
                    }
                }
            });

            const ctxD = document.getElementById('deviceChart').getContext('2d');
            deviceChart = new Chart(ctxD, {
                type: 'doughnut',
                data: {
                    labels: ['PC', 'Mobile'],
                    datasets: [{
                        data: [50, 50],
                        backgroundColor: ['#3b82f6', '#a855f7'],
                        borderWidth: 0,
                        cutout: '80%'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function updateDashboard() {
            document.getElementById("progress").style.width = "0%";
            setTimeout(() => document.getElementById("progress").style.width = "100%", 100);

            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                // Stats
                document.getElementById("activeCount").innerText = data.activeCount;
                document.getElementById("totalRegistered").innerText = data.totalRegistered;
                document.getElementById("todayCount").innerText = data.daily.count;
                document.getElementById("todayPc").innerText = data.daily.pc;
                document.getElementById("todayMobile").innerText = data.daily.mobile;
                document.getElementById("monthCount").innerText = data.monthly.count;
                document.getElementById("totalCount").innerText = data.total.count;
                document.getElementById("updateTime").innerText = "Last Sync: " + new Date().toLocaleTimeString();

                // Live User List
                const listDiv = document.getElementById("userList");
                listDiv.innerHTML = data.activeList.length ? "" : '<div class="h-full flex items-center justify-center text-slate-700 italic text-sm">No Active Users</div>';
                data.activeList.forEach(u => {
                    listDiv.innerHTML += `
                        <div class="bg-slate-800/40 p-4 rounded-2xl flex justify-between items-center border-l-4 border-l-green-500 shadow-sm">
                            <span class="font-black text-slate-100">${u.name}</span>
                            <span class="text-[9px] font-black text-green-500 bg-green-500/10 px-2 py-1 rounded">ON</span>
                        </div>`;
                });

                // Ranking
                const rankDiv = document.getElementById("rankingList");
                rankDiv.innerHTML = "";
                data.ranking.forEach((u, index) => {
                    rankDiv.innerHTML += `
                        <div class="flex justify-between items-center bg-slate-800/20 p-3 rounded-xl">
                            <span class="text-xs font-bold text-slate-500">#${index+1} <span class="text-slate-200 ml-2 font-black">${u.name}</span></span>
                            <span class="text-[10px] font-black bg-slate-800 text-slate-400 px-3 py-1 rounded-full">${u.count}회</span>
                        </div>`;
                });

                // Update Charts
                trafficChart.data.datasets[0].data = data.hourlyTraffic;
                trafficChart.update();

                deviceChart.data.datasets[0].data = [data.total.pc, data.total.mobile];
                deviceChart.update();

                const pcPer = Math.round((data.total.pc / data.total.count) * 100) || 0;
                document.getElementById("pcRatio").innerText = pcPer + "%";
                document.getElementById("mobRatio").innerText = (100 - pcPer) + "%";

            } catch (e) { console.error("Update Error:", e); }
        }

        initCharts();
        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
