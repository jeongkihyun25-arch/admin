<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#f8fafc] text-slate-700 min-h-screen font-sans">

    <div class="max-w-[1400px] mx-auto p-4 lg:p-10">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded shadow-sm">ADMIN TOWER</span>
                    <span id="liveStatus" class="flex items-center gap-1.5 text-blue-600 text-[10px] font-bold tracking-widest">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> LIVE MONITORING
                    </span>
                </div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">BSTK <span class="text-blue-600">DASHBOARD</span></h1>
            </div>
            <div class="flex flex-col items-end gap-2">
                <span id="updateTime" class="text-xs font-bold text-slate-400">데이터를 불러오는 중...</span>
                <div class="h-1.5 w-64 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                    <div id="progress" class="h-full bg-blue-500 w-0 transition-all duration-[15000ms] ease-linear"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white border border-slate-200 p-7 rounded-[2rem] shadow-sm relative overflow-hidden group">
                <p class="text-slate-400 text-[11px] font-black uppercase tracking-widest mb-1">실시간 접속</p>
                <div class="flex items-baseline gap-2">
                    <span id="activeCount" class="text-5xl font-black text-blue-600">0</span>
                    <span class="text-slate-400 font-bold">/ <span id="totalRegistered">0</span>명</span>
                </div>
            </div>
            <div class="bg-white border border-slate-200 p-7 rounded-[2rem] shadow-sm">
                <p class="text-slate-400 text-[11px] font-black uppercase tracking-widest mb-1">오늘 접속</p>
                <div class="flex items-baseline gap-2">
                    <span id="todayCount" class="text-5xl font-black text-slate-800">0</span>
                    <span class="text-slate-400 font-bold text-xs">회</span>
                </div>
                <div class="mt-3 flex gap-2">
                    <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">PC <span id="todayPc">0</span></span>
                    <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg">MOB <span id="todayMobile">0</span></span>
                </div>
            </div>
            <div class="bg-white border border-slate-200 p-7 rounded-[2rem] shadow-sm ring-2 ring-blue-500/5">
                <p class="text-blue-500 text-[11px] font-black uppercase tracking-widest mb-1 italic">이번 주 누적 (Weekly)</p>
                <div class="flex items-baseline gap-2">
                    <span id="weekCount" class="text-5xl font-black text-slate-800">0</span>
                    <span class="text-slate-400 font-bold text-xs text-blue-500">Hits</span>
                </div>
            </div>
            <div class="bg-slate-900 p-7 rounded-[2rem] shadow-xl">
                <p class="text-slate-500 text-[11px] font-black uppercase tracking-widest mb-1">이번 달 전체</p>
                <div class="flex items-baseline gap-2">
                    <span id="monthCount" class="text-5xl font-black text-white">0</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm flex flex-col h-[600px]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-sm text-slate-800 uppercase tracking-widest">Active Members</h3>
                    <i class="fa-solid fa-circle-dot text-blue-500 text-[10px] animate-pulse"></i>
                </div>
                <div id="userList" class="space-y-3 overflow-y-auto pr-2 custom-scrollbar flex-grow">
                    </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm">
                    <h3 class="font-black text-sm text-slate-400 uppercase tracking-widest mb-6 italic">24-Hour Traffic Trend</h3>
                    <div class="h-48 w-full">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm">
                        <h3 class="font-black text-sm text-blue-600 uppercase tracking-widest mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-award"></i> User Ranking (TOP 10)
                        </h3>
                        <div id="rankingList" class="space-y-3">
                            </div>
                    </div>
                    <div class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm flex flex-col items-center">
                        <h3 class="font-black text-sm text-slate-400 uppercase tracking-widest mb-6 w-full text-center">Lifetime Device Split</h3>
                        <div class="w-44 h-44">
                            <canvas id="deviceChart"></canvas>
                        </div>
                        <div class="mt-8 flex gap-12">
                            <div class="text-center">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Desktop</p>
                                <p id="pcRatio" class="text-2xl font-black text-blue-600">0%</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Mobile</p>
                                <p id="mobRatio" class="text-2xl font-black text-indigo-600">0%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyNCBDFxirct_VTn5HNS5LSdEMf3iC-pHLmOIVap9PZONguh5Pl8Gh9lg_i6K97SGnn/exec";
        
        let trafficChart, deviceChart;

        function initCharts() {
            const ctxT = document.getElementById('trafficChart').getContext('2d');
            trafficChart = new Chart(ctxT, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i + '시'),
                    datasets: [{
                        data: Array(24).fill(0),
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 2,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { stepSize: 1, color: '#94a3b8' } }
                    }
                }
            });

            const ctxD = document.getElementById('deviceChart').getContext('2d');
            deviceChart = new Chart(ctxD, {
                type: 'doughnut',
                data: {
                    labels: ['PC', 'Mobile'],
                    datasets: [{
                        data: [1, 1],
                        backgroundColor: ['#2563eb', '#6366f1'],
                        borderWidth: 0,
                        cutout: '80%'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function updateDashboard() {
            document.getElementById("progress").style.width = "0%";
            setTimeout(() => document.getElementById("progress").style.width = "100%", 100);

            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                // Stats Update
                document.getElementById("activeCount").innerText = data.activeCount;
                document.getElementById("totalRegistered").innerText = data.totalRegistered;
                document.getElementById("todayCount").innerText = data.daily.count;
                document.getElementById("todayPc").innerText = data.daily.pc;
                document.getElementById("todayMobile").innerText = data.daily.mobile;
                document.getElementById("weekCount").innerText = data.weekly.count;
                document.getElementById("monthCount").innerText = data.monthly.count;
                document.getElementById("updateTime").innerText = "최종 갱신: " + new Date().toLocaleTimeString();

                // User List (No Limit)
                const listDiv = document.getElementById("userList");
                listDiv.innerHTML = data.activeList.length ? "" : '<div class="h-full flex flex-col items-center justify-center text-slate-300 italic text-sm gap-2"><i class="fa-solid fa-moon text-3xl"></i><span>현재 접속자 없음</span></div>';
                data.activeList.forEach(u => {
                    listDiv.innerHTML += `
                        <div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center border border-slate-100 hover:border-blue-200 transition-colors group">
                            <span class="font-black text-slate-700">${u.name}님</span>
                            <span class="text-[9px] font-black text-blue-600 bg-blue-100 px-2 py-1 rounded-md">CONNECTED</span>
                        </div>`;
                });

                // Ranking
                const rankDiv = document.getElementById("rankingList");
                rankDiv.innerHTML = "";
                data.ranking.forEach((u, index) => {
                    rankDiv.innerHTML += `
                        <div class="flex justify-between items-center p-3 rounded-xl hover:bg-slate-50 transition-colors">
                            <span class="text-xs font-bold text-slate-400 w-8">#${index+1}</span>
                            <span class="text-sm font-black text-slate-700 flex-grow">${u.name}</span>
                            <span class="text-[11px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">${u.count}회</span>
                        </div>`;
                });

                // Charts Update
                trafficChart.data.datasets[0].data = data.hourlyTraffic;
                trafficChart.update();

                deviceChart.data.datasets[0].data = [data.total.pc, data.total.mobile];
                deviceChart.update();

                const total = data.total.count || 1;
                const pcPer = Math.round((data.total.pc / total) * 100);
                document.getElementById("pcRatio").innerText = pcPer + "%";
                document.getElementById("mobRatio").innerText = (100 - pcPer) + "%";

            } catch (e) { console.error("Sync Error:", e); }
        }

        initCharts();
        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
