<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK HQ | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #0062ff; --neon-purple: #8b5cf6; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        #mainDashboard { display: none; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .stat-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-950 z-[9999] flex items-center justify-center p-6">
        <div class="w-full max-w-md text-center">
            <div class="mb-8 inline-block p-4 rounded-3xl bg-blue-600/10 border border-blue-500/20">
                <i class="fa-solid fa-shield-halved text-blue-500 text-5xl animate-pulse"></i>
            </div>
            <h1 class="text-white font-orbitron text-4xl font-black italic tracking-tighter mb-2">BSTK HQ</h1>
            <p class="text-slate-500 font-bold text-xs uppercase tracking-[0.4em] mb-10">Admin Authorization</p>
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/10 shadow-2xl backdrop-blur-xl">
                <input type="password" id="pwInput" placeholder="••••" maxlength="4"
                       class="w-full bg-transparent border-b-2 border-slate-700 text-white text-5xl text-center font-orbitron focus:outline-none focus:border-blue-500 transition-all mb-8 pb-2 tracking-widest">
                <button onclick="checkPassword()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-500 transition-all shadow-lg shadow-blue-500/30 font-orbitron italic">INITIATE SYSTEM</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="p-4 lg:p-10 max-w-[1600px] mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-12 gap-6">
            <div>
                <div class="flex items-center gap-3 mb-3">
                    <span class="bg-slate-900 text-white text-[10px] font-black px-3 py-1 rounded-full font-orbitron tracking-tighter italic">COMMANDER ONLY</span>
                    <span class="flex items-center gap-2 text-blue-600 text-[10px] font-black tracking-widest">
                        <span class="w-2 h-2 bg-blue-600 rounded-full animate-ping"></span> SYSTEM LIVE
                    </span>
                </div>
                <h2 class="text-5xl font-black text-slate-900 tracking-tighter italic">HQ <span class="text-blue-600">INTELLIGENCE</span></h2>
            </div>
            <div class="flex flex-col items-end">
                <p id="updateTime" class="text-[10px] font-black text-slate-400 font-orbitron mb-2 uppercase">Syncing satellites...</p>
                <div class="w-72 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress" class="h-full bg-blue-600 w-0 transition-all duration-[30000ms] ease-linear"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass-card stat-card p-8 rounded-[2.5rem] shadow-sm border-l-4 border-l-blue-600">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">Active Assets</p>
                <div class="flex items-baseline gap-2">
                    <span id="activeCount" class="text-6xl font-black text-slate-900 font-orbitron tracking-tighter">0</span>
                    <span class="text-slate-400 font-bold italic">/ <span id="totalRegistered">0</span></span>
                </div>
            </div>
            <div class="glass-card stat-card p-8 rounded-[2.5rem] shadow-sm border-l-4 border-l-emerald-500">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">Daily Influx</p>
                <div class="flex items-baseline gap-2">
                    <span id="todayCount" class="text-6xl font-black text-slate-900 font-orbitron tracking-tighter">0</span>
                    <span class="text-emerald-500 font-black text-xs">HITS</span>
                </div>
                <div class="mt-4 flex gap-4">
                    <div class="text-[10px] font-bold text-slate-500">PC <span id="todayPc" class="text-blue-600">0</span></div>
                    <div class="text-[10px] font-bold text-slate-500">MOB <span id="todayMobile" class="text-purple-600">0</span></div>
                </div>
            </div>
            <div class="glass-card stat-card p-8 rounded-[2.5rem] shadow-sm border-l-4 border-l-amber-500">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">Weekly Cycle</p>
                <div class="flex items-baseline gap-2">
                    <span id="weekCount" class="text-6xl font-black text-slate-900 font-orbitron tracking-tighter">0</span>
                </div>
            </div>
            <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 opacity-10 text-8xl text-white"><i class="fa-solid fa-chart-line"></i></div>
                <p class="text-slate-500 text-[11px] font-black uppercase tracking-widest mb-4">Monthly Status</p>
                <span id="monthCount" class="text-6xl font-black text-white font-orbitron tracking-tighter">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass-card p-8 rounded-[3rem] shadow-sm h-[650px] flex flex-col">
                <div class="flex justify-between items-center mb-8 px-2">
                    <h3 class="font-black text-xs text-slate-800 uppercase tracking-widest italic">Live Signals</h3>
                    <span id="activeCountBadge" class="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full">0명 접속</span>
                </div>
                <div id="userList" class="space-y-4 overflow-y-auto pr-2 custom-scrollbar flex-grow">
                    </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="glass-card p-10 rounded-[3rem] shadow-sm">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="font-black text-xs text-slate-400 uppercase tracking-widest italic underline underline-offset-8 decoration-blue-500">24-Hour Traffic Pulse</h3>
                    </div>
                    <div class="h-56 w-full"><canvas id="trafficChart"></canvas></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="glass-card p-8 rounded-[3rem] shadow-sm">
                        <h3 class="font-black text-xs text-blue-600 uppercase tracking-widest mb-8 flex items-center gap-2">
                            <i class="fa-solid fa-crown"></i> Loyalty Ranking
                        </h3>
                        <div id="rankingList" class="space-y-3"></div>
                    </div>
                    <div class="glass-card p-8 rounded-[3rem] shadow-sm flex flex-col items-center">
                        <h3 class="font-black text-xs text-slate-400 uppercase tracking-widest mb-8 w-full text-center italic">Platform Distribution</h3>
                        <div class="w-44 h-44 relative"><canvas id="deviceChart"></canvas></div>
                        <div class="mt-8 flex gap-12 text-center">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 mb-1 font-orbitron">PC</p>
                                <p id="pcRatio" class="text-2xl font-black text-blue-600 font-orbitron">0%</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 mb-1 font-orbitron">MOBILE</p>
                                <p id="mobRatio" class="text-2xl font-black text-purple-600 font-orbitron">0%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyNCBDFxirct_VTn5HNS5LSdEMf3iC-pHLmOIVap9PZONguh5Pl8Gh9lg_i6K97SGnn/exec";
        const ADMIN_PW = "1541";
        
        function checkPassword() {
            const input = document.getElementById('pwInput').value;
            if(input === ADMIN_PW) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                initCharts();
                updateDashboard();
                setInterval(updateDashboard, 30000); // 30초 주기
            } else {
                alert("ACCESS DENIED: INCORRECT KEY");
                document.getElementById('pwInput').value = '';
            }
        }

        document.getElementById('pwInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        let trafficChart, deviceChart;

        function initCharts() {
            const ctxT = document.getElementById('trafficChart').getContext('2d');
            const blueGradient = ctxT.createLinearGradient(0, 0, 0, 400);
            blueGradient.addColorStop(0, 'rgba(0, 98, 255, 0.2)');
            blueGradient.addColorStop(1, 'rgba(0, 98, 255, 0)');

            trafficChart = new Chart(ctxT, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i + 'H'),
                    datasets: [{
                        data: Array(24).fill(0),
                        borderColor: '#0062ff',
                        backgroundColor: blueGradient,
                        fill: true,
                        tension: 0.45,
                        borderWidth: 4,
                        pointRadius: 0,
                        pointHoverRadius: 6
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { font: { size: 10, family: 'Orbitron' }, color: '#94a3b8' } },
                        y: { display: false }
                    }
                }
            });

            const ctxD = document.getElementById('deviceChart').getContext('2d');
            deviceChart = new Chart(ctxD, {
                type: 'doughnut',
                data: {
                    labels: ['PC', 'Mobile'],
                    datasets: [{
                        data: [1, 1],
                        backgroundColor: ['#0062ff', '#a855f7'],
                        borderWidth: 0,
                        cutout: '80%'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function updateDashboard() {
            // 프로그레스 바 리셋
            const bar = document.getElementById("progress");
            bar.style.transition = 'none';
            bar.style.width = "0%";
            setTimeout(() => {
                bar.style.transition = 'width 30000ms linear';
                bar.style.width = "100%";
            }, 100);

            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                // 수치 업데이트
                document.getElementById("activeCount").innerText = data.activeCount;
                document.getElementById("activeCountBadge").innerText = data.activeCount + "명 접속 중";
                document.getElementById("totalRegistered").innerText = data.totalRegistered;
                document.getElementById("todayCount").innerText = data.daily.count;
                document.getElementById("todayPc").innerText = data.daily.pc;
                document.getElementById("todayMobile").innerText = data.daily.mobile;
                document.getElementById("weekCount").innerText = data.weekly.count;
                document.getElementById("monthCount").innerText = data.monthly.count;
                document.getElementById("updateTime").innerText = "Sat-Sync: " + new Date().toLocaleTimeString();

                // 실시간 리스트
                const listDiv = document.getElementById("userList");
                listDiv.innerHTML = data.activeList.length ? "" : '<div class="h-full flex flex-col items-center justify-center text-slate-300 italic py-20 font-black"><i class="fa-solid fa-satellite-dish mb-4 text-4xl animate-bounce"></i>NO SIGNALS</div>';
                data.activeList.forEach(u => {
                    listDiv.innerHTML += `
                        <div class="bg-white p-5 rounded-[1.5rem] flex justify-between items-center border border-slate-100 shadow-sm hover:shadow-md transition-all group">
                            <div class="flex items-center gap-3">
                                <span class="status-dot bg-blue-600 shadow-[0_0_8px_rgba(0,98,255,0.6)] animate-pulse"></span>
                                <span class="font-black text-slate-700 text-lg italic">${u.name}</span>
                            </div>
                            <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-md uppercase">Authorized</span>
                        </div>`;
                });

                // 랭킹
                const rankDiv = document.getElementById("rankingList");
                rankDiv.innerHTML = "";
                data.ranking.forEach((u, i) => {
                    rankDiv.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-blue-200 transition-all">
                            <span class="font-orbitron font-black text-slate-400 text-xs w-8">#${i+1}</span>
                            <span class="font-black text-slate-700 flex-grow">${u.name}</span>
                            <span class="font-orbitron font-black text-blue-600">${u.count} <span class="text-[9px] text-slate-400">Hits</span></span>
                        </div>`;
                });

                // 차트 업데이트
                trafficChart.data.datasets[0].data = data.hourlyTraffic;
                trafficChart.update();
                deviceChart.data.datasets[0].data = [data.total.pc, data.total.mobile];
                deviceChart.update();

                const total = data.total.count || 1;
                const pcP = Math.round((data.total.pc / total) * 100);
                document.getElementById("pcRatio").innerText = pcP + "%";
                document.getElementById("mobRatio").innerText = (100 - pcP) + "%";

            } catch (e) { console.error("Sync Error:", e); }
        }
    </script>
</body>
</html>
