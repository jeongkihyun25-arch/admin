<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 초기에는 대시보드를 숨깁니다 */
        #mainDashboard { display: none; }
        #loginOverlay { display: flex; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-700 min-h-screen font-sans">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 z-[9999] flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-lock text-blue-600 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">ADMIN ACCESS</h2>
            <p class="text-slate-400 text-sm mb-8 font-bold">관리자 비밀번호를 입력하세요</p>
            
            <input type="password" id="pwInput" 
                   class="w-full bg-slate-100 border-none rounded-2xl p-5 text-center text-2xl tracking-[0.5em] font-black focus:ring-4 focus:ring-blue-500/20 mb-4" 
                   placeholder="****" maxlength="4">
            
            <button onclick="checkPassword()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/30">
                접속하기
            </button>
            <p id="errorMsg" class="text-red-500 text-xs mt-4 font-bold hidden italic">비밀번호가 틀렸습니다.</p>
        </div>
    </div>

    <div id="mainDashboard" class="max-w-[1400px] mx-auto p-4 lg:p-10">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded shadow-sm">ADMIN TOWER</span>
                    <span id="liveStatus" class="flex items-center gap-1.5 text-blue-600 text-[10px] font-bold tracking-widest">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> LIVE MONITORING
                    </span>
                </div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">BSTK <span class="text-blue-600">DASHBOARD</span></h1>
            </div>
            <div class="flex flex-col items-end gap-2">
                <span id="updateTime" class="text-xs font-bold text-slate-400">데이터를 불러오는 중...</span>
                <div class="h-1.5 w-64 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                    <div id="progress" class="h-full bg-blue-500 w-0 transition-all duration-[15000ms] ease-linear"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white border border-slate-200 p-7 rounded-[2rem] shadow-sm relative overflow-hidden group">
                <p class="text-slate-400 text-[11px] font-black uppercase tracking-widest mb-1">실시간 접속</p>
                <div class="flex items-baseline gap-2">
                    <span id="activeCount" class="text-5xl font-black text-blue-600">0</span>
                    <span class="text-slate-400 font-bold">/ <span id="totalRegistered">0</span>명</span>
                </div>
            </div>
            <div class="bg-white border border-slate-200 p-7 rounded-[2rem] shadow-sm">
                <p class="text-slate-400 text-[11px] font-black uppercase tracking-widest mb-1">오늘 접속</p>
                <div class="flex items-baseline gap-2">
                    <span id="todayCount" class="text-5xl font-black text-slate-800">0</span>
                    <span class="text-slate-400 font-bold text-xs">회</span>
                </div>
                <div class="mt-3 flex gap-2">
                    <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">PC <span id="todayPc">0</span></span>
                    <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg">MOB <span id="todayMobile">0</span></span>
                </div>
            </div>
            <div class="bg-white border border-slate-200 p-7 rounded-[2rem] shadow-sm">
                <p class="text-blue-500 text-[11px] font-black uppercase tracking-widest mb-1 italic">이번 주 누적 (Weekly)</p>
                <div class="flex items-baseline gap-2">
                    <span id="weekCount" class="text-5xl font-black text-slate-800">0</span>
                    <span class="text-slate-400 font-bold text-xs">Hits</span>
                </div>
            </div>
            <div class="bg-slate-900 p-7 rounded-[2rem] shadow-xl text-white">
                <p class="text-slate-500 text-[11px] font-black uppercase tracking-widest mb-1">이번 달 전체</p>
                <div class="flex items-baseline gap-2 text-white">
                    <span id="monthCount" class="text-5xl font-black">0</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm h-[600px] flex flex-col">
                <h3 class="font-black text-sm text-slate-800 uppercase tracking-widest mb-6">Active Members</h3>
                <div id="userList" class="space-y-3 overflow-y-auto pr-2 custom-scrollbar flex-grow"></div>
            </div>
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm h-64">
                    <h3 class="font-black text-sm text-slate-400 uppercase tracking-widest mb-6 italic">24-Hour Traffic Trend</h3>
                    <div class="h-32 w-full"><canvas id="trafficChart"></canvas></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm">
                        <h3 class="font-black text-sm text-blue-600 uppercase tracking-widest mb-6"><i class="fa-solid fa-award"></i> User Ranking (TOP 10)</h3>
                        <div id="rankingList" class="space-y-3"></div>
                    </div>
                    <div class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm flex flex-col items-center">
                        <h3 class="font-black text-sm text-slate-400 uppercase tracking-widest mb-6">Device Split</h3>
                        <div class="w-40 h-40"><canvas id="deviceChart"></canvas></div>
                        <div class="mt-6 flex gap-8">
                            <div class="text-center"><p id="pcRatio" class="text-xl font-black text-blue-600">0%</p></div>
                            <div class="text-center"><p id="mobRatio" class="text-xl font-black text-indigo-600">0%</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyNCBDFxirct_VTn5HNS5LSdEMf3iC-pHLmOIVap9PZONguh5Pl8Gh9lg_i6K97SGnn/exec";
        const ADMIN_PW = "1541"; // 기현님이 요청하신 비밀번호
        
        function checkPassword() {
            const input = document.getElementById('pwInput').value;
            if(input === ADMIN_PW) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                initCharts();
                updateDashboard();
                setInterval(updateDashboard, 15000);
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
                document.getElementById('pwInput').value = '';
            }
        }

        // Enter키로 로그인 가능하게
        document.getElementById('pwInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });

        let trafficChart, deviceChart;

        function initCharts() {
            const ctxT = document.getElementById('trafficChart').getContext('2d');
            trafficChart = new Chart(ctxT, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i + '시'),
                    datasets: [{
                        data: Array(24).fill(0),
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true }, y: { beginAtZero: true } } }
            });

            const ctxD = document.getElementById('deviceChart').getContext('2d');
            deviceChart = new Chart(ctxD, {
                type: 'doughnut',
                data: {
                    labels: ['PC', 'Mobile'],
                    datasets: [{
                        data: [1, 1],
                        backgroundColor: ['#2563eb', '#6366f1'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function updateDashboard() {
            document.getElementById("progress").style.width = "0%";
            setTimeout(() => document.getElementById("progress").style.width = "100%", 100);

            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                document.getElementById("activeCount").innerText = data.activeCount;
                document.getElementById("totalRegistered").innerText = data.totalRegistered;
                document.getElementById("todayCount").innerText = data.daily.count;
                document.getElementById("todayPc").innerText = data.daily.pc;
                document.getElementById("todayMobile").innerText = data.daily.mobile;
                document.getElementById("weekCount").innerText = data.weekly.count;
                document.getElementById("monthCount").innerText = data.monthly.count;
                document.getElementById("updateTime").innerText = "최종 갱신: " + new Date().toLocaleTimeString();

                const listDiv = document.getElementById("userList");
                listDiv.innerHTML = data.activeList.length ? "" : '<p class="text-center text-slate-300 py-10">접속자 없음</p>';
                data.activeList.forEach(u => {
                    listDiv.innerHTML += `<div class="bg-slate-50 p-4 rounded-2xl flex justify-between border border-slate-100"><span class="font-black text-slate-700">${u.name}님</span><span class="text-[9px] font-black text-blue-600">CONNECTED</span></div>`;
                });

                const rankDiv = document.getElementById("rankingList");
                rankDiv.innerHTML = "";
                data.ranking.forEach((u, i) => {
                    rankDiv.innerHTML += `<div class="flex justify-between p-2"><span class="text-sm font-black text-slate-700">#${i+1} ${u.name}</span><span class="text-blue-600 font-bold">${u.count}회</span></div>`;
                });

                trafficChart.data.datasets[0].data = data.hourlyTraffic;
                trafficChart.update();
                deviceChart.data.datasets[0].data = [data.total.pc, data.total.mobile];
                deviceChart.update();

                const total = data.total.count || 1;
                document.getElementById("pcRatio").innerText = Math.round((data.total.pc / total) * 100) + "%";
                document.getElementById("mobRatio").innerText = (100 - Math.round((data.total.pc / total) * 100)) + "%";

            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
